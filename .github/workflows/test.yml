name: Simple Terraform Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # optional manual trigger

jobs:
  terraform:
    runs-on: [self-hosted, macOS, X64]   # your runner labels

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Run tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0
